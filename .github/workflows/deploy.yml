name: Deploy

# Deploy to the VPS only after the CI workflow succeeds on main.
on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # For workflow_run: only on success. For manual dispatch: always run.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /opt/pigtrack-pro
            git fetch --all
            git reset --hard origin/main
            cd deploy
            docker compose up -d --build
            docker image prune -f
